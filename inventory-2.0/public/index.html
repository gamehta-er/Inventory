<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory 2.0 Command Center</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-topnav" aria-label="Inventory 2.0 navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <strong>NVIDIA</strong>
            <span>Inventory <em>2.0</em></span>
          </div>
        </div>

        <nav class="nav-list" id="navList">
          <button class="nav-item active" type="button" data-view="command">
            <span class="nav-icon home" aria-hidden="true"></span>
            Search
          </button>
          <button class="nav-item" type="button" data-view="import">
            <span class="nav-icon upload" aria-hidden="true"></span>
            Import
          </button>
          <button class="nav-item" type="button" data-view="replenishment">
            <span class="nav-icon cart" aria-hidden="true"></span>
            Requests
          </button>
          <button class="nav-item" type="button" data-view="reports">
            <span class="nav-icon chart" aria-hidden="true"></span>
            Reports
          </button>
          <button class="nav-item" type="button" data-view="system">
            <span class="nav-icon gear" aria-hidden="true"></span>
            Admin
          </button>
        </nav>

        <div class="topbar-actions">
          <label class="theme-control">
            Theme
            <select id="themeSelect" aria-label="Theme">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="classic">Classic</option>
            </select>
          </label>
          <button class="button secondary" id="refreshButton" type="button">Refresh</button>
          <div class="user-chip" id="userChip" aria-label="Signed in user">
            <span id="userInitials">IM</span>
            <div>
              <strong id="userName">#imargulis-staff</strong>
              <small id="userRole">Inventory Team</small>
            </div>
          </div>
          <button class="button secondary" id="signOutButton" type="button">Sign out</button>
        </div>
      </header>

      <main class="workspace">
        <header class="topbar">
          <div class="title-block">
            <div class="breadcrumb">
              <strong>Inventory 2.0</strong>
              <span id="viewCrumb">Search</span>
            </div>
            <h1 id="viewTitle">Search</h1>
            <p id="viewDescription">Find one asset, one device family, or one exact identifier without extra noise.</p>
          </div>
          <div class="topbar-actions page-actions">
            <span class="status-chip online" id="runtimeChip">Live data</span>
          </div>
        </header>

        <section class="metric-grid" id="metricGrid" aria-label="Inventory health summary"></section>

        <section class="filter-panel" id="filterPanel" aria-label="Inventory filters">
          <label>
            Category
            <select id="categoryFilter"></select>
          </label>
          <label>
            Catalog ID
            <select id="skuFilter"></select>
          </label>
          <label>
            Location
            <select id="locationFilter"></select>
          </label>
          <label>
            Availability
            <select id="availabilityFilter">
              <option value="all">All availability</option>
              <option value="available">Available</option>
              <option value="low">Needs review</option>
              <option value="missing">Unavailable</option>
            </select>
          </label>
          <label class="search-control">
            Search
            <input id="searchFilter" placeholder="Search catalog ID, model, alias, location, owner, metadata" />
          </label>
          <div class="filter-actions">
            <button class="button secondary" id="clearFiltersButton" type="button">Clear</button>
            <button class="button secondary" id="exportFilteredButton" type="button">Export Filtered</button>
          </div>
        </section>

        <div class="work-grid" id="workGrid">
          <section class="module-surface" id="viewContent" aria-live="polite"></section>
          <aside class="inspector" id="inspector" aria-label="Selected catalog record details"></aside>
        </div>

        <p class="inline-status" id="statusLine" role="status"></p>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
