<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory 2.0 Command Center</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Inventory 2.0 navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <strong>NVIDIA</strong>
            <span>Lab Hardware Inventory</span>
          </div>
        </div>

        <nav class="nav-list" id="navList">
          <button class="nav-item active" type="button" data-view="command">
            <span class="nav-icon home" aria-hidden="true"></span>
            Command Center
          </button>
          <button class="nav-item" type="button" data-view="explorer">
            <span class="nav-icon cube" aria-hidden="true"></span>
            Inventory Explorer
          </button>
          <button class="nav-item" type="button" data-view="operations">
            <span class="nav-icon flow" aria-hidden="true"></span>
            Stock Operations
          </button>
          <button class="nav-item" type="button" data-view="replenishment">
            <span class="nav-icon cart" aria-hidden="true"></span>
            Replenishment
          </button>
          <button class="nav-item" type="button" data-view="audit">
            <span class="nav-icon ledger" aria-hidden="true"></span>
            Transaction Audit
          </button>
          <button class="nav-item" type="button" data-view="governance">
            <span class="nav-icon tag" aria-hidden="true"></span>
            Catalog Governance
          </button>
          <button class="nav-item" type="button" data-view="system">
            <span class="nav-icon gear" aria-hidden="true"></span>
            System Operations
          </button>
        </nav>

        <div class="sidebar-footer">
          <span>Comparison model</span>
          <strong>Port 3001</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="title-block">
            <div class="breadcrumb">
              <strong>Inventory 2.0</strong>
              <span id="viewCrumb">Command Center</span>
            </div>
            <h1 id="viewTitle">Command Center</h1>
            <p id="viewDescription">Executive inventory position with SKU-level drilldown, risk visibility, and stock controls.</p>
          </div>
          <div class="topbar-actions">
            <span class="status-chip online" id="runtimeChip">SQLite Online</span>
            <button class="button secondary" id="refreshButton" type="button">Refresh</button>
            <a class="button secondary" href="/exports/inventory-snapshot">Export Snapshot</a>
            <div class="user-chip" aria-label="Signed in user">
              <span>GM</span>
              <div>
                <strong>Gaurav Mehta</strong>
                <small>Administrator</small>
              </div>
            </div>
          </div>
        </header>

        <section class="metric-grid" id="metricGrid" aria-label="Inventory health summary"></section>

        <section class="filter-panel" id="filterPanel" aria-label="Inventory filters">
          <label>
            Category
            <select id="categoryFilter"></select>
          </label>
          <label>
            SKU
            <select id="skuFilter"></select>
          </label>
          <label>
            Location
            <select id="locationFilter"></select>
          </label>
          <label>
            Availability
            <select id="availabilityFilter">
              <option value="all">All availability</option>
              <option value="available">Available</option>
              <option value="low">Low stock</option>
              <option value="missing">Missing</option>
            </select>
          </label>
          <label class="search-control">
            Search
            <input id="searchFilter" placeholder="Search SKU, part, alias, bin, owner, metadata" />
          </label>
          <div class="filter-actions">
            <button class="button secondary" id="clearFiltersButton" type="button">Clear</button>
            <button class="button secondary" id="exportFilteredButton" type="button">Export Filtered</button>
          </div>
        </section>

        <div class="work-grid" id="workGrid">
          <section class="module-surface" id="viewContent" aria-live="polite"></section>
          <aside class="inspector" id="inspector" aria-label="Selected SKU details"></aside>
        </div>

        <p class="inline-status" id="statusLine" role="status"></p>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
