# Build Inventory 3.0 documentation for GitLab Pages
#
# Published site artifact: inventory-3.0/site/
# Local preview: pip install -r requirements-docs.txt && mkdocs serve

pages:docs:
  image: python:3.12-slim
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - inventory-3.0/docs/**/*
        - inventory-3.0/mkdocs.yml
        - inventory-3.0/requirements-docs.txt
        - .gitlab-ci.yml
  script:
    - pip install --quiet -r inventory-3.0/requirements-docs.txt
    - cd inventory-3.0 && mkdocs build --strict
    - cd ..
    - mkdir -p public/inventory-3.0
    - cp -a inventory-3.0/site/. public/inventory-3.0/
  artifacts:
    paths:
      - public
  pages:
    publish: public
